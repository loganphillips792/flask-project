apiVersion: 1

providers:
  - name: 'default' # A uniquely identifiable name for the provider
    orgId: 1
    folder: '' # Optional: The Grafana folder to provision dashboards to. Empty means root.
    type: file
    disableDeletion: false # When true, dashboards from this provider cannot be deleted by users
    editable: false # When true, dashboards from this provider can be edited by users.
                   # Changes will be overwritten by the provisioned dashboard on next Grafana restart or update.
    options:
      path: /etc/grafana/provisioning/dashboards # Path to the directory containing dashboard JSON files
      # For K8s, this should be the path in the Grafana container,
      # which is mapped from your local ./grafana/provisioning/dashboards
