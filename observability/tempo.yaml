# Required by the Grafana Tempo datasource's streamingEnabled option
# (grafana/provisioning/datasources/datasources.yaml) — without it, TraceQL
# search streams fail with "gRPC streaming call failed".
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

distributor:
  receivers:
    otlp:
      protocols:
        # 0.0.0.0 rather than the container hostname: binding to `tempo:` works
        # only for as long as container_name stays exactly that.
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 720h             # overall Tempo trace retention

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: docker-compose
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    local_blocks:
      filter_server_spans: false
      flush_to_storage: true

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal

overrides:
  defaults:
    metrics_generator:
      # span-metrics produces the traces_spanmetrics_* series that Grafana's
      # tracesToMetrics links query; service-graphs feeds the Service Graph.
      processors: [service-graphs, span-metrics, local-blocks]

usage_report:
  reporting_enabled: false
