name: flask-observability

services:
  flask-app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - '5001:5001'
    environment:
      - SECRET_KEY=dev-secret-change-me
      - LIBRARY_DB_PATH=/data/library.db
      - OTEL_SERVICE_NAME=flask-app
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318
      - LOG_LEVEL=INFO
      # Seeds demo users and books before gunicorn starts, so the stack comes up
      # with a working demo login instead of empty tables.
      - SEED_DB=1
    volumes:
      # Named volume, not a bind mount: SQLite WAL mode needs an mmap'd -shm
      # file, which is unreliable over Docker Desktop's filesystem sharing.
      - library-data:/data
    depends_on:
      - tempo
    networks:
      - library-network

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      # Tempo's metrics_generator remote-writes span metrics here.
      - '--web.enable-remote-write-receiver'
      - '--enable-feature=exemplar-storage'
      - '--enable-feature=native-histograms'
    ports:
      - '9090:9090'
    networks:
      - library-network

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
      - tempo
    ports:
      - '3001:3000'
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=secretpassword
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor metricsSummary
    networks:
      - library-network

  loki:
    image: grafana/loki:3.4.2
    user: root
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
      - loki-wal:/wal
    networks:
      - library-network

  promtail:
    image: grafana/promtail:3.0.0
    ports:
      - "9080:9080"
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - library-network

  tempo:
    image: grafana/tempo:2.7.1
    command: "-target=all -config.file=/etc/tempo.yaml"
    restart: always
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      # Named volume: the image runs as uid 10001, so a bind-mounted dir would
      # be created root-owned and Tempo would crash-loop unable to write blocks.
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - library-network

volumes:
  library-data:
  grafana-storage:
  loki-data:
  loki-wal:
  tempo-data:

networks:
  library-network:
    driver: bridge
